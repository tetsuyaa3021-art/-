<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>労務費価格転嫁ロジック資料生成</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:sans-serif;margin:0;background:#f4f6f9}
header{background:#0d1b2a;color:#fff;padding:20px}
main{padding:20px;max-width:1200px;margin:auto}
.card{background:#fff;padding:20px;margin-bottom:20px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
h2{margin-top:0}
input{padding:6px;margin:4px 0;width:100%}
button{padding:10px 20px;background:#0077b6;color:#fff;border:none;border-radius:8px;cursor:pointer}
.slide{page-break-after:always;background:#fff;padding:40px;margin-bottom:30px}
.title{font-size:28px;font-weight:bold;margin-bottom:20px}
.subtitle{color:#555}
</style>
</head>
<body>

<header>
<h1>労務費価格転嫁 説明資料生成システム</h1>
</header>

<main>

<div class="card">
<h2>数値入力</h2>

<label>人件費（基準年）</label>
<input id="baseLabor" type="number" value="3000">

<label>現在人件費</label>
<input id="currentLabor" type="number" value="3600">

<label>生産性指数（基準=100）</label>
<input id="productivity" type="number" value="105">

<label>労務費構成比（%）</label>
<input id="laborRatio" type="number" value="35">

<button onclick="generate()">資料生成</button>
</div>

<div id="slides"></div>

</main>

<script>
function generate(){

let baseLabor = Number(document.getElementById("baseLabor").value);
let currentLabor = Number(document.getElementById("currentLabor").value);
let productivity = Number(document.getElementById("productivity").value);
let laborRatio = Number(document.getElementById("laborRatio").value);

let laborIncrease = ((currentLabor-baseLabor)/baseLabor*100).toFixed(1);
let impact = (laborRatio * (laborIncrease/100)).toFixed(2);

let slides = document.getElementById("slides");

slides.innerHTML = `

<div class="slide">
<div class="title">① 労務費上昇に伴う価格見直しのご相談</div>
<div class="subtitle">安定した品質と供給体制を維持するためのご説明です</div>
</div>

<div class="slide">
<div class="title">② 環境変化</div>
<p>業界全体で労務費は上昇しています。</p>
</div>

<div class="slide">
<div class="title">③ 自社労務費推移</div>
<p>基準年 ${baseLabor}円 → 現在 ${currentLabor}円</p>
<p>上昇率 ${laborIncrease}%</p>
</div>

<div class="slide">
<div class="title">④ 生産性改善</div>
<p>生産性指数：${productivity}</p>
</div>

<div class="slide">
<div class="title">⑤ 生産性 vs 人件費</div>
<p>生産性改善を上回るスピードで労務費が上昇しています。</p>
</div>

<div class="slide">
<div class="title">⑥ 製品1単位あたり労務費</div>
<p>再上昇傾向にあります。</p>
</div>

<div class="slide">
<div class="title">⑦ 原価構成比</div>
<p>労務費構成比：${laborRatio}%</p>
<p>労務費${laborIncrease}%上昇 → 製品原価 約${impact}%上昇</p>
</div>

<div class="slide">
<div class="title">⑧ 転嫁しない場合の影響</div>
<p>品質維持のための原資確保が必要です。</p>
</div>

<div class="slide">
<div class="title">⑨ ご相談内容</div>
<p>持続可能な価格構造についてご相談させてください。</p>
</div>

`;

}
</script>

</body>
</html>
